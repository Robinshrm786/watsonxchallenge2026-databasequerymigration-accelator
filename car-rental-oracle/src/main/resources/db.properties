# Oracle Database Connection Configuration
# Car Rental Application

# Oracle Thin JDBC URL formats:
#   SID:      jdbc:oracle:thin:@hostname:1521:SID
#   Service:  jdbc:oracle:thin:@hostname:1521/service_name
#   TNS:      jdbc:oracle:thin:@(DESCRIPTION=(ADDRESS=(PROTOCOL=TCP)(HOST=host)(PORT=1521))(CONNECT_DATA=(SERVICE_NAME=XEPDB1)))

db.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
db.user=car_rental
db.password=car_rental_pass
db.pool.size=10

